<!doctype html>
<html lang="en" data-mode="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Nunito (headings) and Inter (file names/sizes) per warren-app-spec.md.
      No font files are bundled in this workstream (no new deps allowed);
      src/ui/theme.css declares the font-family stacks with system
      fallbacks. If pixel-perfect brand fonts matter, add a self-hosted
      @fontsource-nunito / @fontsource-inter package and a <link> or
      @font-face here instead of relying on a public CDN (Tauri webviews
      are offline-capable and CSP may block remote font fetches).

      data-mode="dark" is static (not JS-injected) so dark is the default
      look with zero flash-of-light-mode on load. Kumo switches its
      light-dark() token pairs (see src/ui/theme.css) off this attribute's
      effect on the computed `color-scheme` property, set in
      node_modules/@cloudflare/kumo/dist/styles/kumo-binding.css. A future
      light/dark toggle can just flip this attribute at runtime.
    -->
    <title>Lopload</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
