name: Build
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundle-dir: deb
          - os: macos-latest
            bundle-dir: macos
          - os: windows-latest
            bundle-dir: msi

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: System dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Derive version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "TAURI_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build application
        # Only tag builds (real releases) sign updater artifacts — everyday
        # push/PR builds pass --no-sign so they keep working before the
        # TAURI_SIGNING_PRIVATE_KEY secret exists (see README's "Auto
        # updates" section for the one-time owner setup).
        run: bun run tauri build ${{ !startsWith(github.ref, 'refs/tags/v') && '--no-sign' || '' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Copy raw binary (Windows portable)
        if: runner.os == 'Windows'
        run: |
          copy src-tauri\target\release\lopload.exe src-tauri\target\release\bundle\msi\Lopload_portable.exe

      - name: Record macOS updater arch (for the release job's latest.json)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        run: |
          ARCH="${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}"
          echo "$ARCH" > src-tauri/target/release/bundle/updater-arch-darwin.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Build updater manifest (latest.json)
        run: bun run .github/scripts/build-latest-json.mjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.deb
            **/*.rpm
            **/*.AppImage
            **/*.AppImage.tar.gz
            **/*.AppImage.tar.gz.sig
            **/*.dmg
            **/*.app.tar.gz
            **/*.app.tar.gz.sig
            **/*.msi
            **/*.msi.zip
            **/*.msi.zip.sig
            **/*.exe
            **/*.nsis.zip
            **/*.nsis.zip.sig
            latest.json
          generate_release_notes: true
