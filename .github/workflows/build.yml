name: Build
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundle-dir: deb
          # Pinned (not macos-latest) so the runner image only changes when we
          # choose to bump it.
          - os: macos-26
            bundle-dir: macos
          - os: windows-latest
            bundle-dir: msi

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Caches ~/.cargo and src-tauri/target across runs. Tag builds restore
      # caches saved on the default branch, so warm the cache by running this
      # workflow via workflow_dispatch on main after big dependency changes.
      # save-if skips saving on tag refs (those caches would be unreachable
      # by later runs and only churn the 10 GB cache quota).
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: System dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Bake the tag's version into package.json (tauri.conf.json reads it from
      # there via "version": "../package.json"). Must match the version
      # build-latest-json.mjs derives from the same tag, or the updater loops
      # forever offering the release it's already on.
      - name: Set version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: bun run scripts/set-version.mjs

      - name: Build application
        # Only tag builds (real releases) sign updater artifacts — everyday
        # push/PR builds pass --no-sign so they keep working before the
        # TAURI_SIGNING_PRIVATE_KEY secret exists (see README's "Auto
        # updates" section for the one-time owner setup).
        run: bun run tauri build ${{ !startsWith(github.ref, 'refs/tags/v') && '--no-sign' || '' }}
        env:
          # tauri.conf.json pins the local self-signed "Lopload Dev" identity
          # (stable keychain ACL across dev installs); CI has no such cert, so
          # override back to ad-hoc signing here. "-" is codesign's ad-hoc marker.
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Copy raw binary (Windows portable)
        if: runner.os == 'Windows'
        run: |
          copy src-tauri\target\release\lopload.exe src-tauri\target\release\bundle\msi\Lopload_portable.exe

      - name: Record macOS updater arch (for the release job's latest.json)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        run: |
          ARCH="${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}"
          echo "$ARCH" > src-tauri/target/release/bundle/updater-arch-darwin.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    # action-gh-release creates the release with the workflow GITHUB_TOKEN,
    # which is read-only unless granted here.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Build updater manifest (latest.json)
        run: bun run .github/scripts/build-latest-json.mjs

      - name: Determine if this is a prerelease
        # Semver convention: a tag with a "-" after the version (v1.2.0-beta.1,
        # v1.2.0-rc.1) is a prerelease; a plain vX.Y.Z tag is a full release.
        id: prerelease
        run: echo "value=${{ contains(github.ref_name, '-') }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ steps.prerelease.outputs.value }}
          # Sig globs follow createUpdaterArtifacts: true (Tauri v2 native)
          # naming: .sig sits next to the bundle itself (.AppImage.sig,
          # -setup.exe.sig, .msi.sig), except macOS which keeps .app.tar.gz.
          files: |
            **/*.deb
            **/*.rpm
            **/*.AppImage
            **/*.AppImage.sig
            **/*.dmg
            **/*.app.tar.gz
            **/*.app.tar.gz.sig
            **/*.msi
            **/*.msi.sig
            **/*.exe
            **/*.exe.sig
            latest.json
          generate_release_notes: true
