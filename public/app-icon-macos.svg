<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- macOS Dock icon: same leaping-bunny mark as favicon.svg (nod to the
       app's original codename "Warren"), rebuilt as a proper Big Sur+ style
       squircle with subtle top-to-bottom gradient shading, a soft inner
       highlight near the top edge, and a gentle bottom shadow, instead of a
       flat cream square. Keep this in sync with favicon.svg's glyph if the
       mark ever changes; favicon.svg itself is left flat for browser/window
       use and should not be regressed. -->
  <defs>
    <linearGradient id="backdrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F7F8FA"/>
      <stop offset="100%" stop-color="#E9EAED"/>
    </linearGradient>
    <linearGradient id="topHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="bunnyStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EC8140"/>
      <stop offset="100%" stop-color="#D9631F"/>
    </linearGradient>
  </defs>

  <!-- Squircle backdrop (~22.37% corner radius) with gradient shading -->
  <rect width="512" height="512" rx="115" fill="url(#backdrop)"/>
  <!-- Soft bottom shadow for depth -->
  <rect width="512" height="512" rx="115" fill="url(#bottomShadow)"/>
  <!-- Soft inner highlight hugging the top edge -->
  <rect x="0" y="0" width="512" height="240" rx="115" fill="url(#topHighlight)"/>

  <g transform="translate(256,272) scale(0.66) rotate(-6)"
     fill="none" stroke="url(#bunnyStroke)" stroke-width="16" stroke-linejoin="round" stroke-linecap="round">
    <path d="
      M 200 60
      L 180 88
      L 150 96
      L 140 150
      L 110 158
      L 100 140
      L 40 120
      L -40 112
      L -100 116
      L -112 122
      L -190 152
      L -176 120
      L -140 72
      L -152 50
      L -134 38
      L -90 -8
      L -20 -42
      L 40 -56
      L 70 -72
      L 55 -160
      L 76 -92
      L 78 -84
      L 110 -166
      L 130 -92
      L 160 -18
      L 185 22
      Z
    "/>
    <circle cx="150" cy="10" r="7" fill="#D9631F" stroke="none"/>
  </g>
</svg>
