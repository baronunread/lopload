services:
  minio:
    image: minio/minio
    container_name: lopload-demo-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: lopload-demo
      MINIO_ROOT_PASSWORD: lopload-demo-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - lopload-demo-minio-data:/data

volumes:
  lopload-demo-minio-data:
